<div class="min-h-screen flex bg-[#FAFAFA] text-gray-900 font-sans">
  
  <!-- Sidebar (Desktop) -->
  <aside class="hidden md:flex flex-col w-64 bg-white border-r border-gray-200 h-screen sticky top-0 z-20">
    <div class="p-8">
      <h1 class="font-serif text-3xl font-bold tracking-tight">Stylora.</h1>
    </div>

    <nav class="flex-1 px-4 space-y-2">
      <button 
        (click)="navigate('dashboard')"
        [class.bg-gray-100]="currentView() === 'dashboard'"
        class="flex items-center gap-3 w-full px-4 py-3 text-left rounded-xl transition hover:bg-gray-50 text-gray-700 font-medium">
        <app-icon name="sparkles" class="w-5 h-5"/>
        <span>Dashboard</span>
      </button>

      <button 
        (click)="navigate('wardrobe')"
        [class.bg-gray-100]="currentView() === 'wardrobe'"
        class="flex items-center gap-3 w-full px-4 py-3 text-left rounded-xl transition hover:bg-gray-50 text-gray-700 font-medium">
        <app-icon name="hanger" class="w-5 h-5"/>
        <span>Wardrobe</span>
      </button>

      <button 
        (click)="navigate('tryon')"
        [class.bg-gray-100]="currentView() === 'tryon'"
        class="flex items-center gap-3 w-full px-4 py-3 text-left rounded-xl transition hover:bg-gray-50 text-gray-700 font-medium">
        <app-icon name="camera" class="w-5 h-5"/>
        <span>Virtual Studio</span>
      </button>

      <button 
        (click)="navigate('analysis')"
        [class.bg-gray-100]="currentView() === 'analysis'"
        class="flex items-center gap-3 w-full px-4 py-3 text-left rounded-xl transition hover:bg-gray-50 text-gray-700 font-medium">
        <div class="w-5 h-5 rounded-full bg-gradient-to-tr from-pink-500 to-purple-500"></div>
        <span>Color Analysis</span>
      </button>
    </nav>

    <div class="p-4 border-t border-gray-100">
      <div class="text-xs text-gray-400 text-center">Stylora v1.0 &copy; 2024</div>
    </div>
  </aside>

  <!-- Mobile Header -->
  <div class="md:hidden fixed top-0 left-0 right-0 bg-white/80 backdrop-blur z-30 border-b border-gray-200 p-4 flex justify-between items-center">
    <h1 class="font-serif text-xl font-bold">Stylora.</h1>
    <button (click)="isMenuOpen.set(!isMenuOpen())" class="p-2">
       <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
       </svg>
    </button>
  </div>

  <!-- Mobile Menu Overlay -->
  @if (isMenuOpen()) {
    <div class="fixed inset-0 bg-black/50 z-40 md:hidden" (click)="isMenuOpen.set(false)"></div>
    <div class="fixed right-0 top-0 bottom-0 w-64 bg-white z-50 p-6 flex flex-col md:hidden animate-slide-left shadow-2xl">
      <div class="flex justify-between items-center mb-8">
        <h2 class="font-serif text-2xl font-bold">Menu</h2>
        <button (click)="isMenuOpen.set(false)" class="text-2xl">&times;</button>
      </div>
      <nav class="space-y-4">
        <button (click)="navigate('dashboard')" class="block w-full text-left text-lg py-2 border-b border-gray-100">Dashboard</button>
        <button (click)="navigate('wardrobe')" class="block w-full text-left text-lg py-2 border-b border-gray-100">Wardrobe</button>
        <button (click)="navigate('tryon')" class="block w-full text-left text-lg py-2 border-b border-gray-100">Virtual Studio</button>
        <button (click)="navigate('analysis')" class="block w-full text-left text-lg py-2 border-b border-gray-100">Color Analysis</button>
      </nav>
    </div>
  }

  <!-- Main Content Area -->
  <main class="flex-1 p-6 md:p-12 overflow-y-auto h-screen pt-20 md:pt-12">
    <div class="max-w-6xl mx-auto">
      @switch (currentView()) {
        @case ('dashboard') { <app-dashboard /> }
        @case ('wardrobe') { <app-wardrobe /> }
        @case ('analysis') { <app-analysis /> }
        @case ('tryon') { <app-try-on /> }
      }
    </div>
  </main>

</div>
