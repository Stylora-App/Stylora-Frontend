<div class="auth-shell">

  <!-- Hero side -->
  <div class="auth-hero">
    <div class="auth-hero-noise"></div>

    <div class="auth-hero-top">
      <span class="auth-hero-pulse" [class.auth-hero-pulse-play]="pulse()"></span>
      <span class="auth-hero-tagline">FIND YOUR TRUE STYLE</span>
    </div>

    <div class="auth-hero-center">
      <h1 class="auth-hero-title">Style begins<br><em>with you.</em></h1>
      <p class="auth-hero-sub">
        Stylora reads your undertone, learns your wardrobe, and helps you assemble outfits that actually look like you.
      </p>
    </div>

    <div class="auth-hero-bottom">
      @for (c of heroPaletteColors; track c) {
        <span class="auth-hero-swatch" [style.background]="c" [class.auth-hero-swatch-entered]="entered()"></span>
      }
      <span class="auth-hero-swatch-label">SAMPLE · SOFT AUTUMN</span>
    </div>
  </div>

  <!-- Form side -->
  <div class="auth-form-side">
    <app-auth-forms (authenticated)="onAuthenticated()" />
  </div>

</div>
