<div class="fixed top-4 right-4 z-50 flex flex-col gap-3 max-w-md pointer-events-none">
  @for (notification of notificationService.notifications(); track notification.id) {
    <div 
      class="pointer-events-auto p-4 border rounded-xl text-sm flex items-start gap-3 shadow-lg animate-slide-in-right {{ getClasses(notification.type) }}"
      role="alert">
      <!-- Icon -->
      <svg class="w-5 h-5 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="getIcon(notification.type)"/>
      </svg>
      
      <!-- Message Content -->
      <div class="flex-1 min-w-0">
        <p class="break-words">{{ notification.message }}</p>
        
        <!-- Confirm Buttons (only shown if this is a confirmation dialog) -->
        @if (isConfirm(notification)) {
          <div class="mt-3 flex gap-2">
            <button 
              (click)="onConfirm(notification.id, true)"
              class="px-3 py-1.5 rounded-lg text-xs font-medium bg-gray-900 text-white hover:bg-gray-800 transition">
              Confirm
            </button>
            <button 
              (click)="onConfirm(notification.id, false)"
              class="px-3 py-1.5 rounded-lg text-xs font-medium bg-gray-200 text-gray-700 hover:bg-gray-300 transition">
              Cancel
            </button>
          </div>
        }
      </div>
      
      <!-- Close Button (only for non-confirm notifications) -->
      @if (!isConfirm(notification)) {
        <button 
          (click)="close(notification.id)"
          class="shrink-0 hover:opacity-70 transition"
          aria-label="Close notification">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      }
    </div>
  }
</div>
